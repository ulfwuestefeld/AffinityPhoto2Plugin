name: Build AffinityPhoto2 Plugin

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'

jobs:
  build:
    name: Build Plugin
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.7

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4.0.1
        with:
          dotnet-version: '8.0.x'

      - name: Verify .NET installation
        run: dotnet --version

      - name: Install LogiPluginTool
        run: dotnet tool install --global LogiPluginTool

      - name: Restore dependencies
        working-directory: src/AffinityPhoto2Plugin
        run: dotnet restore

      - name: Build plugin (Debug)
        working-directory: src/AffinityPhoto2Plugin
        run: dotnet build -c Debug

      - name: Build plugin (Release)
        working-directory: src/AffinityPhoto2Plugin
        run: dotnet build -c Release

      - name: Upload build artifacts (Debug)
        uses: actions/upload-artifact@v4
        with:
          name: debug-build
          path: bin/Debug/bin/
          retention-days: 5

      - name: Upload build artifacts (Release)
        uses: actions/upload-artifact@v4
        with:
          name: release-build
          path: bin/Release/bin/
          retention-days: 30

  package:
    name: Create Plugin Package
    runs-on: windows-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.7

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4.0.1
        with:
          dotnet-version: '8.0.x'

      - name: Download Release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-build
          path: bin/Release/bin/

      - name: Install LogiPluginTool
        run: dotnet tool install --global LogiPluginTool

      - name: Prepare package structure
        run: |
          # Remove old package structure
          if (Test-Path "AffinityPhoto2Package") {
            Remove-Item -Recurse -Force "AffinityPhoto2Package"
          }
          
          # Create new structure
          New-Item -ItemType Directory -Path "AffinityPhoto2Package\win" -Force | Out-Null
          New-Item -ItemType Directory -Path "AffinityPhoto2Package\metadata" -Force | Out-Null
          
          # Copy plugin DLL
          Copy-Item -Path "bin/Release/bin/AffinityPhoto2Plugin.dll" -Destination "AffinityPhoto2Package\win\" -Force
          
          # Copy dependencies
          Get-ChildItem -Path "bin/Release/bin/*.dll" -Exclude "AffinityPhoto2Plugin.dll" | 
            Copy-Item -Destination "AffinityPhoto2Package\win\" -Force
          
          # Copy metadata files
          Copy-Item -Path "src/AffinityPhoto2Plugin/metadata/LoupedeckPackage.yaml" -Destination "AffinityPhoto2Package\metadata\" -Force
          Copy-Item -Path "src/AffinityPhoto2Plugin/metadata/Icon*.png" -Destination "AffinityPhoto2Package\metadata\" -Force
          
          Write-Host "Package structure prepared:"
          Get-ChildItem -Path "AffinityPhoto2Package" -Recurse

      - name: Extract version from YAML
        id: version
        run: |
          $yaml = Get-Content "src/AffinityPhoto2Plugin/metadata/LoupedeckPackage.yaml" -Raw
          if ($yaml -match "version:\s*(.+)") {
            $version = $matches[1].Trim()
            echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "Version: $version"
          }

      - name: Pack plugin
        run: |
          $PackageName = "AffinityPhoto2_${{ steps.version.outputs.VERSION }}.lplug4"
          logiplugintool pack AffinityPhoto2Package $PackageName
          Write-Host "Package created: $PackageName"
          echo "PACKAGE_NAME=$PackageName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify plugin package
        run: |
          logiplugintool verify ${{ env.PACKAGE_NAME }}
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Package verification failed!"
            exit 1
          }
          Write-Host "Package verification succeeded!"

      - name: Upload plugin package
        uses: actions/upload-artifact@v4
        with:
          name: plugin-package
          path: ${{ env.PACKAGE_NAME }}
          retention-days: 90

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.PACKAGE_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
