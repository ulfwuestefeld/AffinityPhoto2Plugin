name: Code Quality & Testing

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'

jobs:
  analyze:
    name: Code Analysis
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        working-directory: src/AffinityPhoto2Plugin
        run: dotnet restore

      - name: Check formatting (dotnet format)
        working-directory: src/AffinityPhoto2Plugin
        run: dotnet format --verify-no-changes --verbosity diagnostic
        continue-on-error: true

      - name: Build and check warnings
        working-directory: src/AffinityPhoto2Plugin
        run: |
          dotnet build -c Debug --no-restore /p:TreatWarningsAsErrors=false /p:EnforceCodeStyleInBuild=true
        continue-on-error: true

  package-dry-run:
    name: Verify Packaging
    runs-on: windows-latest
    needs: analyze
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build plugin (Release)
        working-directory: src/AffinityPhoto2Plugin
        run: dotnet build -c Release

      - name: Install LogiPluginTool
        run: dotnet tool install --global LogiPluginTool

      - name: Prepare package structure
        run: |
          if (Test-Path "AffinityPhoto2Package") {
            Remove-Item -Recurse -Force "AffinityPhoto2Package"
          }
          
          New-Item -ItemType Directory -Path "AffinityPhoto2Package\win" -Force | Out-Null
          New-Item -ItemType Directory -Path "AffinityPhoto2Package\metadata" -Force | Out-Null
          
          Copy-Item -Path "bin/Release/bin/AffinityPhoto2Plugin.dll" -Destination "AffinityPhoto2Package\win\" -Force
          Get-ChildItem -Path "bin/Release/bin/*.dll" -Exclude "AffinityPhoto2Plugin.dll" | Copy-Item -Destination "AffinityPhoto2Package\win\" -Force
          Copy-Item -Path "src/AffinityPhoto2Plugin/metadata/LoupedeckPackage.yaml" -Destination "AffinityPhoto2Package\metadata\" -Force
          Copy-Item -Path "src/AffinityPhoto2Plugin/metadata/Icon*.png" -Destination "AffinityPhoto2Package\metadata\" -Force

      - name: Extract version from YAML
        id: version
        run: |
          $yaml = Get-Content "src/AffinityPhoto2Plugin/metadata/LoupedeckPackage.yaml" -Raw
          if ($yaml -match "version:\s*(.+)") {
            $version = $matches[1].Trim()
            echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Pack plugin (dry run)
        run: |
          $PackageName = "AffinityPhoto2_${{ steps.version.outputs.VERSION }}.lplug4"
          logiplugintool pack AffinityPhoto2Package $PackageName
          echo "PACKAGE_NAME=$PackageName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify plugin package
        run: |
          logiplugintool verify ${{ env.PACKAGE_NAME }}
          if ($LASTEXITCODE -ne 0) {
            Write-Error "❌ Package verification failed!"
            exit 1
          }
          Write-Host "✅ Package verification succeeded!"

      - name: Test package integrity
        run: |
          Write-Host "Checking package structure..."
          $packagePath = "${{ env.PACKAGE_NAME }}"
          if (-not (Test-Path $packagePath)) {
            Write-Error "Package file not found!"
            exit 1
          }
          Write-Host "✅ Package file exists: $packagePath"
          Write-Host "Size: $(((Get-Item $packagePath).Length / 1024) | Format-String)KB"
